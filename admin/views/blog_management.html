﻿<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中盛启瀚 - 博客管理</title>
    <link href="/css/tailwind.css" rel="stylesheet">
    <link href="/css/fonts.css" rel="stylesheet">
    <script src="/js/lucide.js"></script>
    <style>
        body { 
            font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
        }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 4px 0 30px rgba(0, 0, 0, 0.15);
        }
        
        .sidebar-logo {
            background: linear-gradient(135deg, rgba(0, 99, 65, 0.2) 0%, rgba(0, 77, 51, 0.3) 100%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1.75rem;
        }
        
        .brand-icon {
            background: linear-gradient(135deg, #006341 0%, #004d33 100%);
            box-shadow: 0 8px 25px -5px rgba(0, 99, 65, 0.5);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .brand-icon:hover {
            transform: scale(1.1) rotate(5deg);
        }
        
        .nav-item {
            position: relative;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 14px;
            margin: 6px 14px;
            padding: 14px 16px;
        }
        
        .nav-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            background: linear-gradient(135deg, #006341 0%, #00a86b 100%);
            border-radius: 0 8px 8px 0;
            transition: all 0.3s ease;
            opacity: 0;
        }
        
        .nav-item:hover::before,
        .nav-item.active::before {
            width: 4px;
            height: 60%;
            opacity: 1;
        }
        
        .nav-item:hover,
        .nav-item.active {
            background: linear-gradient(135deg, rgba(0, 99, 65, 0.15) 0%, rgba(0, 99, 65, 0.05) 100%);
            transform: translateX(4px);
        }
        
        .nav-item.active {
            color: #C5A572;
        }
        
        .nav-icon {
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .nav-item:hover .nav-icon {
            transform: scale(1.15) translateX(4px);
        }
        
        .section-title {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            padding: 0 1.5rem;
            margin-bottom: 0.75rem;
        }
        
        .main-content {
            margin-left: 280px;
            transition: margin-left 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .header {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            padding: 1.5rem 2rem;
        }
        
        .page-title {
            font-size: 1.75rem;
            font-weight: 800;
            background: linear-gradient(135deg, #0f172a 0%, #334155 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .content-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 24px;
        }
        
        .content-card:hover {
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.1);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #006341 0%, #004d33 100%);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }
        
        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }
        
        .btn-primary:hover::before {
            left: 100%;
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px -10px rgba(0, 99, 65, 0.5);
        }
        
        .btn-secondary {
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
        }
        
        .btn-secondary:hover {
            background: rgba(0, 99, 65, 0.1);
            border-color: rgba(0, 99, 65, 0.2);
            color: #006341;
        }
        
        .input-field {
            border: 2px solid rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            border-radius: 14px;
        }
        
        .input-field:focus {
            border-color: #006341;
            box-shadow: 0 0 0 4px rgba(0, 99, 65, 0.1);
        }
        
        .post-card {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(0, 0, 0, 0.05);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 20px;
            overflow: hidden;
        }
        
        .post-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }
        
        .post-badge {
            transition: all 0.3s ease;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 16px;
        }
        
        .post-card:hover .post-badge {
            transform: scale(1.05);
        }
        
        .status-badge {
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        
        .status-badge:hover {
            transform: scale(1.1);
        }
        
        .logout-btn {
            transition: all 0.3s ease;
            border-radius: 14px;
            margin: 6px 14px;
            padding: 14px 16px;
        }
        
        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }
        
        .fade-in {
            animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }
        
        .fade-in-delay-1 { animation-delay: 0.1s; }
        .fade-in-delay-2 { animation-delay: 0.2s; }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @media (max-width: 1200px) {
            .sidebar {
                width: 100px;
            }
            .sidebar .nav-text,
            .sidebar .section-title,
            .sidebar .brand-text {
                display: none;
            }
            .sidebar-logo {
                padding: 1.25rem;
                justify-content: center;
            }
            .sidebar-logo > div:first-child {
                margin: 0 auto;
            }
            .nav-item {
                margin: 4px 8px;
                padding: 14px;
                justify-content: center;
            }
            .logout-btn {
                margin: 4px 8px;
                padding: 14px;
                justify-content: center;
            }
            .logout-btn span {
                display: none;
            }
            .main-content {
                margin-left: 100px;
            }
        }
        
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: fixed;
                z-index: 50;
                height: auto;
            }
            .main-content {
                margin-left: 0;
                margin-top: 100px;
            }
        }
        
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, rgba(0, 99, 65, 0.3), rgba(0, 99, 65, 0.1));
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <div class="sidebar min-h-screen fixed top-0 left-0 h-full overflow-y-auto">
        <div class="sidebar-logo">
            <div class="flex items-center space-x-4">
                <div class="brand-icon w-12 h-12 rounded-xl flex items-center justify-center">
                    <i data-lucide="shield-check" class="w-7 h-7 text-white"></i>
                </div>
                <div class="brand-text">
                    <h1 class="font-bold text-white text-xl tracking-tight">中盛启瀚</h1>
                    <p class="text-xs text-gray-400 mt-1">管理后台</p>
                </div>
            </div>
        </div>
        
        <nav class="py-6">
            <div class="section-title text-gray-500 mb-4">网站管理</div>
            
            <a href="/admin" class="nav-item flex items-center space-x-4 text-gray-400 hover:text-gray-300">
                <i data-lucide="layout-dashboard" class="nav-icon w-6 h-6"></i>
                <span class="nav-text font-medium">仪表盘</span>
            </a>
            <a href="/admin/contents" class="nav-item flex items-center space-x-4 text-gray-400 hover:text-gray-300">
                <i data-lucide="file-text" class="nav-icon w-6 h-6"></i>
                <span class="nav-text font-medium">内容管理</span>
            </a>
            <a href="/admin/blog-posts" class="nav-item active flex items-center space-x-4 text-gray-300">
                <i data-lucide="newspaper" class="nav-icon w-6 h-6"></i>
                <span class="nav-text font-medium">博客管理</span>
            </a>
            <a href="/admin/navigation" class="nav-item flex items-center space-x-4 text-gray-400 hover:text-gray-300">
                <i data-lucide="navigation" class="nav-icon w-6 h-6"></i>
                <span class="nav-text font-medium">导航管理</span>
            </a>
            
            <div class="section-title text-gray-500 mt-8 mb-4">AI 工具</div>
            <a href="/admin/ai_assistant" class="nav-item flex items-center space-x-4 text-gray-400 hover:text-gray-300">
                <i data-lucide="sparkles" class="nav-icon w-6 h-6"></i>
                <span class="nav-text font-medium">AI 创作助手</span>
            </a>
            
            <div class="section-title text-gray-500 mt-8 mb-4">系统设置</div>
            <a href="/admin/users" class="nav-item flex items-center space-x-4 text-gray-400 hover:text-gray-300">
                <i data-lucide="users" class="nav-icon w-6 h-6"></i>
                <span class="nav-text font-medium">用户管理</span>
            </a>
            <a href="/admin/system-logs" class="nav-item flex items-center space-x-4 text-gray-400 hover:text-gray-300">
                <i data-lucide="activity" class="nav-icon w-6 h-6"></i>
                <span class="nav-text font-medium">系统日志</span>
            </a>
        </nav>
        
        <div class="absolute bottom-0 left-0 right-0">
            <button onclick="logout()" class="logout-btn w-full flex items-center space-x-4 text-gray-400">
                <i data-lucide="log-out" class="nav-icon w-6 h-6"></i>
                <span class="nav-text font-medium">退出登录</span>
            </button>
        </div>
    </div>
    
    <!-- 主内容区 -->
    <div class="main-content min-h-screen">
        <!-- 头部 -->
        <header class="header flex items-center justify-between">
            <div>
                <h1 class="page-title">博客管理</h1>
                <p class="text-sm text-gray-500 mt-2">管理网站博客文章</p>
            </div>
            <button onclick="createNewPost()" class="btn-primary text-white px-6 py-3 rounded-xl font-semibold flex items-center space-x-2 shadow-lg">
                <i data-lucide="plus" class="w-5 h-5"></i>
                <span>新建文章</span>
            </button>
        </header>
        
        <!-- 内容区域 -->
        <div class="p-8">
            <div class="content-card rounded-2xl p-8 fade-in fade-in-delay-1">
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center space-x-4">
                        <div class="relative">
                            <i data-lucide="search" class="absolute left-4 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                            <input type="text" id="search-input" class="input-field pl-12 pr-5 py-3 w-80 bg-white/80 focus:bg-white outline-none" placeholder="搜索文章...">
                        </div>
                        <select id="filter-status" class="input-field px-5 py-3 bg-white/80 focus:bg-white outline-none cursor-pointer">
                            <option value="">全部状态</option>
                            <option value="draft">草稿</option>
                            <option value="published">已发布</option>
                            <option value="archived">已归档</option>
                        </select>
                    </div>
                </div>
                
                <div id="posts-container" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                    <div class="col-span-full text-center py-12 text-gray-400">
                        <i data-lucide="loader-2" class="w-8 h-8 mx-auto animate-spin"></i>
                        <span class="ml-2 mt-2 block">加载中...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            lucide.createIcons();
            loadPosts();
        });
        
        async function loadPosts() {
            const token = localStorage.getItem('token');
            const headers = token ? { 'Authorization': 'Bearer ' + token } : {};
            
            try {
                const response = await fetch('/blog-posts', { headers });
                const posts = await response.json();
                renderPosts(posts);
            } catch (error) {
                console.error('Failed to load posts:', error);
                document.getElementById('posts-container').innerHTML = '<div class="col-span-full text-center py-12 text-red-400"><i data-lucide="alert-circle" class="w-8 h-8 mx-auto"></i><p class="mt-2">加载失败</p></div>';
                lucide.createIcons();
            }
        }
        
        function renderPosts(posts) {
            const container = document.getElementById('posts-container');
            if (!posts || posts.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center py-12 text-gray-400"><i data-lucide="file-x" class="w-12 h-12 mx-auto opacity-30"></i><p class="mt-2 font-medium">暂无文章</p><p class="text-sm mt-1">开始创建您的第一篇文章吧</p></div>';
                lucide.createIcons();
                return;
            }
            
            container.innerHTML = posts.map(post => `
                <div class="post-card">
                    <div class="p-6">
                        <div class="flex items-start justify-between mb-4">
                            <span class="post-badge ${getStatusClass(post.status)}">${getStatusName(post.status)}</span>
                            ${post.is_ai_generated ? '<span class="post-badge bg-gradient-to-r from-purple-100 to-purple-50 text-purple-600"><i data-lucide="sparkles" class="w-3 h-3 inline mr-1"></i>AI</span>' : ''}
                        </div>
                        <h3 class="font-bold text-gray-800 text-lg mb-3 line-clamp-2">${post.title}</h3>
                        <p class="text-sm text-gray-500 mb-4 line-clamp-3">${post.summary || (post.content ? post.content.substring(0, 100) : '') + '...'}</p>
                        <div class="flex items-center justify-between text-xs text-gray-400 mb-4">
                            <span><i data-lucide="calendar" class="w-3 h-3 inline mr-1"></i>${formatDate(post.created_at)}</span>
                            <span class="px-2 py-1 bg-gray-100 rounded-full">${post.category || '未分类'}</span>
                        </div>
                        <div class="flex items-center space-x-2">
                            <button onclick="editPost('${post.slug}')" class="btn-secondary flex-1 py-2.5 rounded-xl text-sm font-semibold text-gray-700 flex items-center justify-center space-x-2">
                                <i data-lucide="edit-3" class="w-4 h-4"></i>
                                <span>编辑</span>
                            </button>
                            <button onclick="deletePost('${post.slug}')" class="px-4 py-2.5 rounded-xl bg-red-50 hover:bg-red-100 text-red-600 transition-colors">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }
        
        function getStatusClass(status) {
            const classes = { 
                draft: 'bg-gray-100 text-gray-600', 
                published: 'bg-gradient-to-r from-green-100 to-green-50 text-green-600', 
                archived: 'bg-gradient-to-r from-yellow-100 to-yellow-50 text-yellow-600' 
            };
            return classes[status] || 'bg-gray-100 text-gray-600';
        }
        
        function getStatusName(status) {
            const names = { draft: '草稿', published: '已发布', archived: '已归档' };
            return names[status] || status;
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }
        
        function createNewPost() {
            window.location.href = '/admin/blog-edit';
        }
        
        function editPost(slug) {
            window.location.href = `/admin/blog-edit?slug=${slug}`;
        }
        
        async function deletePost(slug) {
            if (!confirm('确定要删除此文章吗？')) return;
            
            const token = localStorage.getItem('token');
            const headers = { 'Authorization': 'Bearer ' + token };
            
            try {
                const response = await fetch(`/blog-posts/${slug}`, { method: 'DELETE', headers });
                if (response.ok) {
                    loadPosts();
                } else {
                    alert('删除失败');
                }
            } catch (error) {
                console.error('Failed to delete post:', error);
            }
        }
        
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login';
        }
    </script>
</body>
</html>
