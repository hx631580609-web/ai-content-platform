<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中盛启瀚 - 管理后台登录</title>
    <link href="/css/tailwind.css" rel="stylesheet">
    <link href="/css/fonts.css" rel="stylesheet">
    <script src="/js/lucide.js"></script>
    <style>
        body { 
            font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        
        /* 左右分栏布局 */
        .login-container {
            display: flex;
            min-height: 100vh;
        }
        
        /* 左侧品牌区 */
        .brand-section {
            flex: 1;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 3rem;
            overflow: hidden;
        }
        
        /* 装饰圆环 */
        .deco-ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(0, 99, 65, 0.3);
        }
        
        .ring-1 {
            width: 600px;
            height: 600px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 8s ease-in-out infinite;
        }
        
        .ring-2 {
            width: 450px;
            height: 450px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 8s ease-in-out infinite 1s;
        }
        
        .ring-3 {
            width: 300px;
            height: 300px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 8s ease-in-out infinite 2s;
            background: radial-gradient(circle, rgba(0, 99, 65, 0.2) 0%, transparent 70%);
            border: none;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.05); }
        }
        
        /* 装饰粒子 */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #006341;
            border-radius: 50%;
            opacity: 0.6;
        }
        
        .brand-content {
            position: relative;
            z-index: 10;
            text-align: center;
            animation: fadeInUp 0.8s ease-out;
        }
        
        .brand-icon-large {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #006341 0%, #00a86b 100%);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 99, 65, 0.5);
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        .brand-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: white;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }
        
        .brand-subtitle {
            font-size: 1.125rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 3rem;
        }
        
        .brand-features {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .feature-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.95rem;
        }
        
        .feature-icon {
            width: 32px;
            height: 32px;
            background: rgba(0, 99, 65, 0.3);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 右侧登录区 */
        .login-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 3rem;
            background: #f8fafc;
            position: relative;
        }
        
        .login-card {
            width: 100%;
            max-width: 400px;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .login-header {
            margin-bottom: 2.5rem;
        }
        
        .login-title {
            font-size: 1.75rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 0.5rem;
        }
        
        .login-desc {
            color: #64748b;
            font-size: 0.95rem;
        }
        
        /* 输入框 */
        .input-group {
            margin-bottom: 1.5rem;
        }
        
        .input-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.5rem;
        }
        
        .input-wrapper {
            position: relative;
        }
        
        .input-field {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 3rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            background: white;
            color: #1f2937;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #006341;
            box-shadow: 0 0 0 4px rgba(0, 99, 65, 0.1);
        }
        
        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            transition: color 0.3s ease;
        }
        
        .input-wrapper:focus-within .input-icon {
            color: #006341;
        }
        
        .password-toggle {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            padding: 0.25rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        
        .password-toggle:hover {
            color: #006341;
            background: rgba(0, 99, 65, 0.1);
        }
        
        /* 登录按钮 */
        .btn-login {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #006341 0%, #004d33 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            position: relative;
            overflow: hidden;
        }
        
        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }
        
        .btn-login:hover::before {
            left: 100%;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px -10px rgba(0, 99, 65, 0.5);
        }
        
        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        
        /* 错误提示 */
        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 0.875rem 1rem;
            border-radius: 12px;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
            display: none;
            animation: shake 0.5s ease;
        }
        
        .error-message.show {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        
        /* 底部提示 */
        .hint-box {
            margin-top: 2rem;
            padding: 1rem;
            background: #f1f5f9;
            border-radius: 12px;
            text-align: center;
        }
        
        .hint-text {
            font-size: 0.8rem;
            color: #64748b;
        }
        
        .hint-text strong {
            color: #006341;
            font-weight: 600;
        }
        
        /* 加载动画 */
        .spinner {
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 响应式 */
        @media (max-width: 1024px) {
            .brand-section {
                display: none;
            }
            .login-section {
                flex: 1;
            }
        }
        
        @media (max-width: 640px) {
            .login-section {
                padding: 1.5rem;
            }
            .login-card {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- 左侧品牌区 -->
        <div class="brand-section">
            <!-- 装饰圆环 -->
            <div class="deco-ring ring-1"></div>
            <div class="deco-ring ring-2"></div>
            <div class="deco-ring ring-3"></div>
            
            <!-- 装饰粒子 -->
            <div class="particle" style="top: 20%; left: 15%;"></div>
            <div class="particle" style="top: 30%; right: 20%; animation-delay: 1s;"></div>
            <div class="particle" style="bottom: 25%; left: 25%; animation-delay: 2s;"></div>
            <div class="particle" style="bottom: 35%; right: 15%; animation-delay: 3s;"></div>
            
            <!-- 品牌内容 -->
            <div class="brand-content">
                <div class="brand-icon-large">
                    <i data-lucide="shield-check" class="w-14 h-14 text-white"></i>
                </div>
                <h1 class="brand-title">中盛启瀚</h1>
                <p class="brand-subtitle">沙特商务服务专家</p>
                
                <div class="brand-features">
                    <div class="feature-item">
                        <div class="feature-icon">
                            <i data-lucide="file-badge" class="w-4 h-4 text-green-400"></i>
                        </div>
                        <span>专业签证服务</span>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">
                            <i data-lucide="car" class="w-4 h-4 text-green-400"></i>
                        </div>
                        <span>全程交通接送</span>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">
                            <i data-lucide="building" class="w-4 h-4 text-green-400"></i>
                        </div>
                        <span>企业考察定制</span>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 右侧登录区 -->
        <div class="login-section">
            <div class="login-card">
                <div class="login-header">
                    <h2 class="login-title">欢迎回来</h2>
                    <p class="login-desc">请登录您的管理账号</p>
                </div>
                
                <div id="error-message" class="error-message">
                    <i data-lucide="alert-circle" class="w-5 h-5"></i>
                    <span id="error-text"></span>
                </div>
                
                <form id="login-form">
                    <div class="input-group">
                        <label for="username" class="input-label">用户名</label>
                        <div class="input-wrapper">
                            <i data-lucide="user" class="input-icon w-5 h-5"></i>
                            <input 
                                type="text" 
                                id="username" 
                                name="username" 
                                class="input-field" 
                                placeholder="请输入用户名"
                                autocomplete="username"
                                required
                            >
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label for="password" class="input-label">密码</label>
                        <div class="input-wrapper">
                            <i data-lucide="lock" class="input-icon w-5 h-5"></i>
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                class="input-field" 
                                placeholder="请输入密码"
                                autocomplete="current-password"
                                required
                            >
                            <button type="button" id="toggle-password" class="password-toggle">
                                <i data-lucide="eye" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                    
                    <button type="submit" id="login-btn" class="btn-login">
                        <span>登 录</span>
                        <i data-lucide="arrow-right" class="w-5 h-5"></i>
                    </button>
                </form>
                
                <div class="hint-box">
                    <p class="hint-text">
                        默认账号: <strong>admin</strong> / <strong>admin123</strong>
                    </p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            lucide.createIcons();
            
            const form = document.getElementById('login-form');
            const loginBtn = document.getElementById('login-btn');
            const errorMessage = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            const togglePassword = document.getElementById('toggle-password');
            const passwordInput = document.getElementById('password');
            
            // 密码显示切换
            togglePassword.addEventListener('click', function() {
                const type = passwordInput.type === 'password' ? 'text' : 'password';
                passwordInput.type = type;
                const iconName = type === 'password' ? 'eye' : 'eye-off';
                togglePassword.innerHTML = `<i data-lucide="${iconName}" class="w-5 h-5"></i>`;
                lucide.createIcons();
            });
            
            // 表单提交
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const username = document.getElementById('username').value.trim();
                const password = passwordInput.value;
                
                if (!username || !password) {
                    showError('请输入用户名和密码');
                    return;
                }
                
                loginBtn.disabled = true;
                loginBtn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 spinner"></i><span>登录中...</span>';
                lucide.createIcons();
                
                try {
                    const response = await fetch('/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password }),
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        localStorage.setItem('token', data.token);
                        localStorage.setItem('user', JSON.stringify(data.user));
                        loginBtn.innerHTML = '<i data-lucide="check" class="w-5 h-5"></i><span>登录成功</span>';
                        lucide.createIcons();
                        setTimeout(() => {
                            window.location.href = '/admin';
                        }, 500);
                    } else {
                        showError(data.message || '登录失败，请重试');
                        resetButton();
                    }
                } catch (error) {
                    showError('网络错误，请稍后重试');
                    resetButton();
                }
                
                function resetButton() {
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<span>登 录</span><i data-lucide="arrow-right" class="w-5 h-5"></i>';
                    lucide.createIcons();
                }
            });
            
            function showError(message) {
                errorText.textContent = message;
                errorMessage.classList.add('show');
                lucide.createIcons();
                setTimeout(() => {
                    errorMessage.classList.remove('show');
                }, 3000);
            }
        });
    </script>
</body>
</html>
